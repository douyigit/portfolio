<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sızma Testi Hazırlık</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <div class="logo-icon">Q</div>
                <h2>QuizApp</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-target="sunu">
                    <span class="nav-icon">📊</span>
                    Sunu Testi
                </button>
                <button class="nav-btn" data-target="walkthrough">
                    <span class="nav-icon">💡</span>
                    Walkthrough Testi
                </button>
                <button class="nav-btn" data-target="bilgiguvenligi">
                    <span class="nav-icon">🛡️</span>
                    Bilgi Güvenliği Testi
                </button>
                <button class="nav-btn" data-target="sibergiris1">
                    <span class="nav-icon">🔒</span>
                    Siber Güvenliğe Giriş 1
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="section-title">Sunu Testi</h1>
                <div class="controls">
                    <label class="expert-toggle" title="Expert Modu açtığınızda cevaplar anında gösterilmez, testin sonunda değerlendirilir.">
                        <span class="toggle-label">Expert Mod:</span>
                        <div class="switch">
                            <input type="checkbox" id="expert-toggle-cb">
                            <span class="slider round"></span>
                        </div>
                    </label>
                    <button id="shuffle-btn" class="action-btn secondary">
                         🔀 Soruları Karıştır
                    </button>
                    <button id="restart-btn" class="action-btn primary">
                         🔄 Yeniden Başlat
                    </button>
                </div>
            </header>

            <div class="quiz-container">
                <div id="expert-summary" class="expert-summary" style="display: none;">
                    <!-- Results will be injected here -->
                </div>

                <div id="quiz-wrapper" class="quiz-wrapper">
                    <!-- Questions will be injected here -->
                </div>

                <div id="submit-wrapper" class="submit-wrapper" style="display: none;">
                    <button id="submit-exam-btn" class="action-btn primary submit-btn">
                        ✅ Testi Değerlendir (Bitir)
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Data & Script -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
